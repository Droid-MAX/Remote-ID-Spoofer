; Remote-ID-Spoofer - Multi-board Configuration

; --- XIAO ESP32-S3 (single-band 2.4GHz) ---
[env:seeed_xiao_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
lib_ldf_mode = chain

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^6.20.0

; --- XIAO ESP32-C5 (dual-band 2.4GHz + 5GHz WiFi 6) ---
[env:seeed_xiao_esp32c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c5
framework = arduino
lib_ldf_mode = chain

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0

upload_speed = 115200
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson@^6.20.0
